/* ===== RESET & BASE ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Exo 2', 'Segoe UI', Arial, sans-serif;
}

body {
    background: #2b1713;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

/* ===== CYBERPUNK BACKGROUND ===== */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 30%, rgba(0, 100, 255, 0.15) 0%, transparent 40%),

        linear-gradient(135deg, #2b1713 0%, #0f0f1a 100%);
    z-index: -2;
}

/* ===== NEON GRID LINES ===== */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        linear-gradient(rgba(0, 150, 255, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 150, 255, 0.1) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: -1;
    opacity: 0.3;
}

/* ===== HEADER - NEON BLUE ===== */
.neon-header {
    background: rgba(10, 15, 25, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid rgb(110, 30, 30);
    box-shadow: 0 0 30px rgba(116, 40, 21, 0.3),
                0 0 60px rgba(0, 102, 255, 0.1) inset;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo-container {
    display: flex;
    align-items: center;
    gap: 15px;
}

.neon-logo {
    width: 150px;
    height: auto;
    filter: drop-shadow(0 0 15px rgb(110, 30, 30))
           drop-shadow(0 0 30px rgb(110, 30, 30))
           drop-shadow(0 0 45px rgb(110, 30, 30));
    animation: neonPulse 2s infinite alternate;
}

@keyframes neonPulse {
    from {
        filter: drop-shadow(0 0 10px rgb(110, 30, 30))
               drop-shadow(0 0 20px rgb(110, 30, 30))
               drop-shadow(0 0 30px rgb(110, 30, 30));
    }
    to {
        filter: drop-shadow(0 0 15px #006eff)
               drop-shadow(0 0 30px #006eff)
               drop-shadow(0 0 45px #006eff);
    }
}

/* ===== NEON BUTTON - BLUE THEME ===== */
.neon-btn {
    background: linear-gradient(90deg, rgb(110, 30, 30), #006eff);
    border: none;
    border-radius: 8px;
    padding: 12px 25px;
    color: #ffffff;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 0 20px rgba(0, 102, 255, 0.5),
                0 0 40px rgba(0, 204, 255, 0.3);
    transition: all 0.3s ease;
}

.neon-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(0, 102, 255, 0.8),
                0 0 60px rgba(0, 204, 255, 0.5);
}

.neon-btn::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -60%;
    width: 60%;
    height: 200%;
    background: linear-gradient(
        120deg,
        rgba(255, 255, 255, 0.9),
        rgba(255, 255, 255, 0.4),
        rgba(255, 255, 255, 0)
    );
    transform: skewX(-25deg);
    animation: shineEffect 2s linear infinite;
}

@keyframes shineEffect {
    0% { left: -60%; }
    100% { left: 120%; }
}

/* ===== MAIN BANNER - SHINY EFFECT ===== */
.shiny-banner {
    position: relative;
    max-width: 500px;
    margin: 20px auto;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid transparent;
    background: linear-gradient(45deg, rgb(110, 30, 30), #006eff, #e27d2b) border-box;
    background-origin: border-box;
    background-clip: padding-box, border-box;
    box-shadow: 0 0 30px rgba(0, 102, 255, 0.4),
                0 0 60px rgba(0, 204, 255, 0.2);
}

.shiny-banner::before {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
        120deg,
        rgba(255, 255, 255, 0.8),
        rgba(255, 255, 255, 0.3),
        rgba(255, 255, 255, 0)
    );
    transform: skewX(-25deg);
    animation: bannerShine 2.5s linear infinite;
    z-index: 2;
    pointer-events: none;
    mix-blend-mode: screen;
}

@keyframes bannerShine {
    0% { left: -75%; opacity: 0.3; }
    50% { opacity: 1; }
    100% { left: 125%; opacity: 0.3; }
}

.shiny-banner amp-img {
    width: 100%;
    height: auto;
    display: block;
    position: relative;
    z-index: 1;
}

/* ===== ACTION BUTTONS GRID ===== */
.action-grid {

.action-btn {
